<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Store Leads Pro | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { gold: '#f59e0b' } } } }
    </script>
    <style>
        body { background: #0a0a0a; font-family: 'Segoe UI', system-ui; }
        .card-bg { background: #1e1e1e; border-radius: 1.5rem; }
        .gold-text { color: #f59e0b; }
        .btn-gold { background: #f59e0b; color: black; font-weight: bold; border-radius: 2rem; padding: 0.5rem 1rem; transition: 0.2s; display: inline-block; text-align: center; }
        .tab-active { color: #f59e0b; border-bottom: 2px solid #f59e0b; }
        .skeleton { background: #2a2a2a; border-radius: 1rem; height: 80px; margin-bottom: 1rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body class="text-white">

<!-- الشريط العلوي -->
<div class="fixed top-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-b border-gray-800 z-10">
    <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
        <div><h1 class="text-xl font-black gold-text">STORE LEADS PRO</h1><p class="text-xs text-gray-400">Intelligence Hub</p></div>
        <div id="userBadge" class="bg-gray-800 px-3 py-1 rounded-full text-sm text-gold">🔄</div>
    </div>
</div>

<!-- المحتوى الديناميكي -->
<div class="max-w-md mx-auto px-4 pt-20 pb-24">
    <!-- تبويب الرادار -->
    <div id="radarContent" class="space-y-4">
        <div class="card-bg p-5 text-center">
            <p class="text-gray-300">مرحبًا <span id="storeNameDisplay" class="gold-text font-bold">...</span></p>
            <div id="pulseCount" class="text-3xl font-black gold-text">0</div>
            <p class="text-xs">عميلات تم رصدهن اليوم</p>
            <div id="fomoText" class="text-xs gold-text mt-2 animate-pulse">باقي 16 يوماً على العيد.. لا تدع منافسيك يسبقونك</div>
        </div>
        <div id="leadsList" class="space-y-3"><div class="skeleton"></div><div class="skeleton"></div></div>
        <button id="refreshBtn" class="btn-gold w-full py-2">🔄 تحديث يدوي</button>
    </div>

    <!-- تبويب الباقات (مخفي في البداية) -->
    <div id="packagesContent" class="hidden space-y-4">
        <div class="card-bg p-5">
            <h3 class="gold-text font-bold mb-2">⭐ باقاتي واشتراكي</h3>
            <div id="currentPackageInfo" class="text-sm space-y-2">...</div>
        </div>
        <div class="card-bg p-5">
            <h3 class="gold-text font-bold mb-2">🚀 عروض الترقية</h3>
            <div id="packagesList" class="space-y-3"></div>
        </div>
        <button id="upgradeContactBtn" class="btn-gold w-full py-2">📞 طلب ترقية أو دعم</button>
    </div>

    <!-- تبويب الإعدادات (مخفي في البداية) -->
    <div id="settingsContent" class="hidden space-y-4">
        <div class="card-bg p-5">
            <h3 class="gold-text font-bold mb-3">🎨 المظهر</h3>
            <div class="flex gap-3">
                <button class="theme-btn flex-1 py-2 rounded-lg bg-gray-800" data-theme="dark">🌙 داكن</button>
                <button class="theme-btn flex-1 py-2 rounded-lg bg-gray-800" data-theme="light">☀️ فاتح</button>
                <button class="theme-btn flex-1 py-2 rounded-lg bg-gray-800" data-theme="gold">🔥 ذهبي</button>
            </div>
        </div>
        <div class="card-bg p-5">
            <h3 class="gold-text font-bold mb-2">📞 الدعم الفني</h3>
            <p class="text-sm text-gray-400">للاستفسارات أو مشاكل الاشتراك</p>
            <button id="supportBtn" class="mt-2 text-gold underline">@nas5873 (اضغط للتواصل)</button>
        </div>
        <div class="text-center text-xs text-gray-500">تم التطوير بواسطة Store Leads Pro V3.0</div>
    </div>
</div>

<!-- الشريط السفلي -->
<div class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 py-2 flex justify-around max-w-md mx-auto">
    <button id="navRadar" class="flex flex-col items-center text-gray-400 text-xs gold-text"><span>📡</span><span>الرادار</span></button>
    <button id="navPackages" class="flex flex-col items-center text-gray-400 text-xs"><span>⭐</span><span>الباقات</span></button>
    <button id="navSettings" class="flex flex-col items-center text-gray-400 text-xs"><span>⚙️</span><span>الإعدادات</span></button>
</div>

<script>
    // ============================================================
    // التكوين وعنوان Web App
    // ============================================================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNaB4D8t44J-LZrBw_joqLOBMUpnc8pzBfjrdV08lA4eIZT9f9pV_E48d_ALvY36vV/exec";
    // ADMIN_CHAT_ID: استبدل هذا الرقم بالـ chat_id الخاص بك (من @userinfobot)
    const ADMIN_CHAT_ID = 6643939693;
    let currentChatId = null;
    let currentStore = { name: "", package: "free", analysesLimit: 5, analysesUsed: 0, endDate: "" };

    // عناصر DOM
    const radarDiv = document.getElementById('radarContent');
    const packagesDiv = document.getElementById('packagesContent');
    const settingsDiv = document.getElementById('settingsContent');
    const navRadar = document.getElementById('navRadar');
    const navPackages = document.getElementById('navPackages');
    const navSettings = document.getElementById('navSettings');
    const refreshBtn = document.getElementById('refreshBtn');
    const supportBtn = document.getElementById('supportBtn');
    const upgradeContactBtn = document.getElementById('upgradeContactBtn');

    // ========== الحصول على معرف المستخدم من تليجرام ==========
    try {
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
            currentChatId = window.Telegram.WebApp.initDataUnsafe.user.id;
        } else {
            // وضع اختبار: استخدم معرفًا تجريبيًا (يفضل تغييره إلى معرفك الحقيقي عند الاختبار)
            currentChatId = 6643939693;
        }
    } catch(e) { currentChatId = 6643939693; }

    // ========== حساب الأيام المتبقية للعيد ==========
    function updateFomo() {
        const today = new Date();
        const year = today.getFullYear();
        let eid = new Date(year, 5, 6); // 6 يونيو تقريباً (قابل للتعديل)
        if (today > eid) eid = new Date(year + 1, 5, 6);
        const diffDays = Math.ceil((eid - today) / (1000 * 60 * 60 * 24));
        const fomoDiv = document.getElementById('fomoText');
        if (fomoDiv) fomoDiv.innerText = `⏳ باقي ${diffDays} يوماً على العيد.. لا تدع منافسيك يسبقونك لهذه الصيدات`;
    }

    // ========== جلب بيانات المستخدم من الـ API ==========
    async function loadUserData() {
        if (!currentChatId) return;
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getUser&chatId=${currentChatId}`);
            const data = await res.json();
            if (data.success && data.user) {
                currentStore.name = data.user.storeName || "تاجر";
                currentStore.package = data.user.package;
                currentStore.analysesLimit = data.user.analysesLimit || 5;
                currentStore.analysesUsed = data.user.analysesUsed || 0;
                currentStore.endDate = data.user.endDate || "";
                document.getElementById('storeNameDisplay').innerText = currentStore.name;
                const badge = document.getElementById('userBadge');
                if (currentStore.package === 'gold') badge.innerHTML = '👑 ذهبية';
                else if (currentStore.package === 'silver') badge.innerHTML = '🥈 فضية';
                else badge.innerHTML = '🆓 تجريبي';
                // تحديث معلومات الباقة
                let remaining = currentStore.analysesLimit - currentStore.analysesUsed;
                if (remaining < 0) remaining = 0;
                document.getElementById('currentPackageInfo').innerHTML = `
                    <p>📦 الباقة: <strong class="gold-text">${currentStore.package === 'gold' ? 'ذهبية 🔥' : (currentStore.package === 'silver' ? 'فضية 🥈' : 'تجريبية 🆓')}</strong></p>
                    <p>📊 التحليلات: ${currentStore.analysesUsed} من ${currentStore.analysesLimit}</p>
                    <div class="w-full bg-gray-700 rounded-full h-2"><div class="bg-gold h-2 rounded-full" style="width: ${(currentStore.analysesUsed/currentStore.analysesLimit)*100}%"></div></div>
                    ${currentStore.endDate ? `<p>📅 التجديد: ${currentStore.endDate}</p>` : ''}
                `;
            } else {
                document.getElementById('storeNameDisplay').innerText = "زائر";
            }
        } catch(e) { console.error(e); }
    }

    // ========== جلب العملاء (Leads) وعرضهم مع النسخ والتواصل ==========
    async function loadLeads() {
        const leadsContainer = document.getElementById('leadsList');
        leadsContainer.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
        updateFomo(); // تحديث العد التنازلي
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getLeads`);
            const data = await res.json();
            if (data.success && data.leads.length) {
                let todayCount = 0;
                let todayStr = new Date().toISOString().slice(0,10);
                let html = '';
                for (let lead of data.leads) {
                    if (lead.date && lead.date.slice(0,10) === todayStr) todayCount++;
                    // حساب حرارة العميل من عمود heat (افتراضي 5)
                    const heat = lead.heat || 5;
                    let fireIcons = '';
                    for (let i = 0; i < Math.min(heat, 5); i++) fireIcons += '🔥';
                    const contacted = lead.contacted === true || lead.contacted === 'TRUE';
                    html += `
                        <div class="card-bg p-3 border-r-4 border-gold relative" data-lead-idx="${lead.idx || ''}">
                            <div class="flex justify-between items-center">
                                <span class="font-bold gold-text">${lead.username}</span>
                                <span class="text-sm">${fireIcons} ${heat}/10</span>
                            </div>
                            <p class="text-sm text-gray-300 mt-1">${lead.tweet.substring(0, 80)}${lead.tweet.length>80?'...':''}</p>
                            <div class="flex flex-wrap gap-2 mt-2">
                                <button class="reply-btn text-xs bg-gold/20 px-3 py-1 rounded-full text-gold" data-reply="${(lead.reply || '').replace(/"/g, '&quot;')}">📋 عرض الرد والنسخ</button>
                                <a href="${lead.url}" target="_blank" class="text-xs bg-gray-700 px-3 py-1 rounded-full">🔗 التغريدة</a>
                                ${!contacted ? `<button class="contact-btn text-xs bg-green-800 px-3 py-1 rounded-full text-white" data-lead-id="${lead.idx || ''}">✅ تم التواصل</button>` : '<span class="text-xs text-green-500 px-3 py-1">✅ تم التواصل</span>'}
                            </div>
                        </div>
                    `;
                }
                document.getElementById('pulseCount').innerText = todayCount;
                leadsContainer.innerHTML = html;
                // ربط أزرار عرض الرد مع النسخ
                document.querySelectorAll('.reply-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const replyText = btn.getAttribute('data-reply');
                        const modal = document.createElement('div');
                        modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4';
                        modal.innerHTML = `
                            <div class="bg-gray-900 rounded-2xl p-5 max-w-sm w-full space-y-3">
                                <h3 class="gold-text font-bold">📋 عرض الرد المقترح</h3>
                                <textarea id="replyContent" class="w-full bg-gray-800 text-white p-3 rounded-xl text-sm" rows="5" readonly>${replyText}</textarea>
                                <button id="copyReplyBtn" class="btn-gold w-full py-2">📋 نسخ الرد</button>
                                <button id="closeModalBtn" class="bg-gray-700 w-full py-2 rounded-xl">إغلاق</button>
                            </div>
                        `;
                        document.body.appendChild(modal);
                        document.getElementById('copyReplyBtn').onclick = () => {
                            navigator.clipboard.writeText(replyText);
                            alert('✅ تم نسخ الرد إلى الحافظة');
                        };
                        document.getElementById('closeModalBtn').onclick = () => modal.remove();
                    });
                });
                // ربط أزرار "تم التواصل" (تحديث العمود contacted)
                document.querySelectorAll('.contact-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const leadId = btn.getAttribute('data-lead-id');
                        if (!leadId) return;
                        // إرسال طلب تحديث إلى Web App (يجب إضافة دالة في Apps Script لتحديث contacted)
                        try {
                            await fetch(WEB_APP_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ action: 'updateLeadContacted', leadId: leadId, contacted: true })
                            });
                            btn.remove();
                            const parent = btn.parentElement;
                            parent.innerHTML += '<span class="text-xs text-green-500 px-3 py-1">✅ تم التواصل</span>';
                        } catch(e) { alert('حدث خطأ أثناء تحديث الحالة'); }
                    });
                });
            } else {
                leadsContainer.innerHTML = '<div class="text-center text-gray-500 py-8">لا توجد تحليلات حديثة</div>';
                document.getElementById('pulseCount').innerText = '0';
            }
        } catch(e) { leadsContainer.innerHTML = '<div class="text-center text-red-500">فشل التحميل</div>'; }
    }

    // ========== جلب قائمة الباقات (Packages) ==========
    async function loadPackages() {
        const packagesList = document.getElementById('packagesList');
        packagesList.innerHTML = '<div class="text-center text-gray-400">جاري التحميل...</div>';
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getPackages`);
            const data = await res.json();
            if (data.success && data.packages.length) {
                let html = '';
                for (let pkg of data.packages) {
                    if (!pkg.active) continue;
                    let isCurrent = (pkg.id === currentStore.package);
                    html += `
                        <div class="bg-black/40 rounded-xl p-3 ${isCurrent ? 'border border-gold' : ''}">
                            <div class="flex justify-between"><span class="font-bold gold-text">${pkg.badge} ${pkg.name}</span><span>${pkg.price} ريال</span></div>
                            <p class="text-xs text-gray-400">${pkg.features || `${pkg.limit} تحليل`}</p>
                            ${!isCurrent ? `<button class="upgrade-btn mt-2 w-full bg-gold text-black text-sm py-1 rounded-lg" data-package="${pkg.id}">🚀 ترقية</button>` : '<span class="text-xs text-green-500 mt-2 inline-block">✓ باقاتك الحالية</span>'}
                        </div>
                    `;
                }
                packagesList.innerHTML = html;
                document.querySelectorAll('.upgrade-btn').forEach(btn => {
                    btn.addEventListener('click', () => { window.open('https://t.me/nas5873', '_blank'); });
                });
            } else {
                packagesList.innerHTML = '<p class="text-center">لا توجد عروض حالياً</p>';
            }
        } catch(e) { packagesList.innerHTML = '<p class="text-center text-red-500">خطأ في التحميل</p>'; }
    }

    // ========== تحديث آخر نشاط للمستخدم ==========
    async function updateLastActive() {
        if (!currentChatId) return;
        await fetch(WEB_APP_URL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ action: 'updateLastActive', chatId: currentChatId }) });
    }

    // ========== لوحة الإدارة المخفية (للمسؤول فقط) ==========
    async function showAdminPanel() {
        if (currentChatId != ADMIN_CHAT_ID) return;
        const adminHtml = `
            <div id="adminPanel" class="fixed inset-0 bg-black/95 z-50 p-4 overflow-auto">
                <div class="max-w-md mx-auto space-y-4">
                    <div class="flex justify-between items-center"><h2 class="text-xl gold-text font-bold">🛠️ لوحة الإدارة</h2><button id="closeAdminBtn" class="bg-red-800 px-3 py-1 rounded-full">✖️ إغلاق</button></div>
                    <div class="card-bg p-4"><div id="adminStats" class="text-sm space-y-1">جاري تحميل الإحصائيات...</div></div>
                    <div class="card-bg p-4"><h3 class="gold-text font-bold mb-2">📋 آخر المشتركين</h3><div id="adminUsersList" class="space-y-2 text-sm"></div></div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', adminHtml);
        document.getElementById('closeAdminBtn').onclick = () => document.getElementById('adminPanel').remove();

        // جلب الإحصائيات والمشتركين
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getAdminData`);
            const data = await res.json();
            if (data.success) {
                document.getElementById('adminStats').innerHTML = `
                    <p>👥 إجمالي المشتركين: ${data.totalSubscribers}</p>
                    <p>📊 تحليلات هذا الشهر: ${data.monthlyLeads}</p>
                    <p>🟢 نشطاء اليوم: ${data.activeToday}</p>
                `;
                let usersHtml = '';
                for (let u of data.recentUsers) {
                    usersHtml += `
                        <div class="bg-gray-800 p-2 rounded-lg flex justify-between items-center">
                            <span>${u.username || u.chatId}</span>
                            <div class="flex gap-2">
                                <a href="https://t.me/${u.username}" target="_blank" class="text-gold underline text-xs">👁️ عرض</a>
                                <a href="https://docs.google.com/spreadsheets/d/1765j-k6ljLpmhtSOPUCEOwaECrBnodUoIQuaYl_I6Ec/edit" target="_blank" class="text-gold underline text-xs">✏️ تعديل</a>
                            </div>
                        </div>
                    `;
                }
                document.getElementById('adminUsersList').innerHTML = usersHtml || '<p class="text-gray-500">لا يوجد مشتركون بعد</p>';
            }
        } catch(e) { console.error(e); }
    }

    // ========== تبديل التبويبات ==========
    function switchTab(tab) {
        radarDiv.classList.add('hidden');
        packagesDiv.classList.add('hidden');
        settingsDiv.classList.add('hidden');
        if (tab === 'radar') { radarDiv.classList.remove('hidden'); loadLeads(); }
        if (tab === 'packages') { packagesDiv.classList.remove('hidden'); loadPackages(); }
        if (tab === 'settings') settingsDiv.classList.remove('hidden');
        [navRadar, navPackages, navSettings].forEach(btn => { btn.classList.remove('gold-text', 'tab-active'); btn.classList.add('text-gray-400'); });
        if (tab === 'radar') navRadar.classList.add('gold-text', 'tab-active');
        if (tab === 'packages') navPackages.classList.add('gold-text', 'tab-active');
        if (tab === 'settings') navSettings.classList.add('gold-text', 'tab-active');
        // إذا كان المستخدم مسؤولاً وأضغط على الإعدادات، نظهر لوحة الإدارة
        if (tab === 'settings' && currentChatId == ADMIN_CHAT_ID) showAdminPanel();
    }

    // ========== الثيمات ==========
    function applyTheme(theme) {
        if (theme === 'light') { document.body.style.backgroundColor = '#f3f4f6'; document.body.classList.add('bg-white'); document.body.classList.remove('bg-dark'); }
        else if (theme === 'gold') { document.body.style.backgroundColor = '#1f1a0a'; }
        else { document.body.style.backgroundColor = '#0a0a0a'; }
        localStorage.setItem('theme_pref', theme);
    }

    // ========== ربط الأحداث ==========
    navRadar.addEventListener('click', () => switchTab('radar'));
    navPackages.addEventListener('click', () => switchTab('packages'));
    navSettings.addEventListener('click', () => switchTab('settings'));
    refreshBtn.addEventListener('click', () => loadLeads());
    if (supportBtn) supportBtn.addEventListener('click', () => window.open('https://t.me/nas5873', '_blank'));
    if (upgradeContactBtn) upgradeContactBtn.addEventListener('click', () => window.open('https://t.me/nas5873', '_blank'));
    document.querySelectorAll('.theme-btn').forEach(btn => { btn.addEventListener('click', () => applyTheme(btn.getAttribute('data-theme'))); });

    // ========== تشغيل أولي ==========
    const savedTheme = localStorage.getItem('theme_pref') || 'dark';
    applyTheme(savedTheme);
    loadUserData().then(() => {
        loadLeads();
        if (currentStore.package !== 'free') loadPackages();
    });
    updateLastActive();

    if (window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
</script>
</body>
    </html>
