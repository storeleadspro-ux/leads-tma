<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Store Leads Pro | Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .gold-text { color: #f59e0b; }
        .gold-border { border-bottom: 2px solid #f59e0b; }
        .card-bg { background: #1f1f1f; border-radius: 1.5rem; }
        .btn-gold { background: #f59e0b; color: #000; font-weight: bold; border-radius: 2rem; padding: 0.5rem 1rem; transition: 0.2s; }
        .btn-outline { border: 1px solid #f59e0b; color: #f59e0b; border-radius: 2rem; padding: 0.5rem 1rem; }
        .tab-active { color: #f59e0b; border-bottom: 2px solid #f59e0b; }
        .skeleton { background: #2a2a2a; border-radius: 1rem; height: 80px; margin-bottom: 1rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body class="text-white">

    <!-- الشريط العلوي -->
    <div class="fixed top-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-b border-gray-800 z-10">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black gold-text">STORE LEADS PRO</h1>
                <p class="text-xs text-gray-400">Intelligence Hub</p>
            </div>
            <div id="userBadge" class="bg-gray-800 px-3 py-1 rounded-full text-gold text-sm">🔓 تجريبي</div>
        </div>
    </div>

    <!-- المحتوى الرئيسي + مسافة للشريط العلوي والسفلي -->
    <div class="max-w-md mx-auto px-4 pt-20 pb-24 space-y-5">
        <!-- بطاقة الترحيب -->
        <div class="card-bg p-5 text-center">
            <p class="text-gray-300">مرحبًا <span id="displayName" class="gold-text font-bold">بطل الأعمال</span></p>
            <p class="text-2xl font-black gold-text mt-1">👑 النظام يعمل بنجاح</p>
            <p class="text-xs text-gray-500 mt-2">الآن يمكنك إضافة بيانات حقيقية لترى التحليلات</p>
        </div>

        <!-- أزرار الاختبار (للتأكد من استجابة الواجهة) -->
        <div class="card-bg p-5 space-y-3">
            <h3 class="font-bold gold-text">🧪 اختبار الأزرار</h3>
            <div class="flex flex-wrap gap-2">
                <button id="testRadarBtn" class="btn-outline px-4 py-2 text-sm">📡 رادار</button>
                <button id="testPackagesBtn" class="btn-outline px-4 py-2 text-sm">⭐ باقاتي</button>
                <button id="testSettingsBtn" class="btn-outline px-4 py-2 text-sm">⚙️ إعدادات</button>
                <button id="testSupportBtn" class="btn-gold px-4 py-2 text-sm">📞 دعم فني</button>
            </div>
            <div id="testOutput" class="bg-black/40 p-3 rounded-xl text-xs text-gray-300 mt-2">
                نتائج الضغط على الأزرار ستظهر هنا
            </div>
        </div>

        <!-- سلة التحديث اليدوي -->
        <button id="manualRefresh" class="btn-gold w-full py-3">🔄 تحديث يدوي (تجريبي)</button>
    </div>

    <!-- الشريط السفلي -->
    <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 py-2 flex justify-around max-w-md mx-auto">
        <button id="navRadar" class="flex flex-col items-center text-gray-400 text-xs tab-active gold-text"><span>📡</span><span>الرادار</span></button>
        <button id="navPackages" class="flex flex-col items-center text-gray-400 text-xs"><span>⭐</span><span>الباقات</span></button>
        <button id="navSettings" class="flex flex-col items-center text-gray-400 text-xs"><span>⚙️</span><span>الإعدادات</span></button>
    </div>

    <script>
        // ========== كود التشغيل الأساسي (يعمل 100% حتى بدون خادم) ==========
        const outputDiv = document.getElementById('testOutput');

        function showMessage(msg) {
            outputDiv.innerHTML = `✅ ${msg} (${new Date().toLocaleTimeString()})`;
        }

        // الأزرار التجريبية
        document.getElementById('testRadarBtn').onclick = () => showMessage('زر الرادار يعمل - يمكن عرض أحدث العملاء');
        document.getElementById('testPackagesBtn').onclick = () => showMessage('زر الباقات يعمل - يمكن عرض خطط الاشتراك');
        document.getElementById('testSettingsBtn').onclick = () => showMessage('زر الإعدادات يعمل - إعدادات الثيم والدعم');
        document.getElementById('testSupportBtn').onclick = () => {
            showMessage('جاري فتح الدعم الفني');
            window.open('https://t.me/nas5873', '_blank');
        };

        // التنقل السفلي (جميعه يعمل)
        document.getElementById('navRadar').onclick = () => showMessage('تم التبديل إلى لوحة الرادار');
        document.getElementById('navPackages').onclick = () => showMessage('تم التبديل إلى الباقات والاشتراكات');
        document.getElementById('navSettings').onclick = () => showMessage('تم التبديل إلى الإعدادات');

        // زر التحديث
        document.getElementById('manualRefresh').onclick = () => showMessage('تم تحديث الواجهة بنجاح (بيانات وهمية حالياً)');

        // تنبيه أن الجافاسكريبت يعمل
        console.log('TMA يعمل الآن - الأزرار كلها تستجيب');
        showMessage('تم تحميل التطبيق المصغر بنجاح 🚀');
    </script>
</body>
</html>
