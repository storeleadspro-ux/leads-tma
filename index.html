<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Store Leads Pro | TMA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; font-family: system-ui; }
        .card-bg { background: #1e1e1e; border-radius: 1.5rem; }
        .gold-text { color: #f59e0b; }
        .btn-gold { background: #f59e0b; color: black; font-weight: bold; border-radius: 2rem; padding: 0.5rem 1rem; }
        .tab-active { color: #f59e0b; border-bottom: 2px solid #f59e0b; }
        .skeleton { background: #2a2a2a; border-radius: 1rem; height: 80px; margin-bottom: 1rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body class="text-white">

<div class="fixed top-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-b border-gray-800 z-10">
    <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
        <div><h1 class="text-xl font-black gold-text">STORE LEADS PRO</h1><p class="text-xs text-gray-400">Intelligence Hub</p></div>
        <div id="userBadge" class="bg-gray-800 px-3 py-1 rounded-full text-sm gold-text">🔄</div>
    </div>
</div>

<div class="max-w-md mx-auto px-4 pt-20 pb-24">
    <!-- تبويب الرادار -->
    <div id="radarContent" class="space-y-4">
        <div class="card-bg p-5 text-center">
            <p class="text-gray-300">مرحبًا <span id="storeNameDisplay" class="gold-text font-bold">...</span></p>
            <div id="leadsCount" class="text-3xl font-black gold-text">0</div>
            <p class="text-xs">عميلات اليوم</p>
        </div>
        <div id="leadsList" class="space-y-3"></div>
        <button id="refreshBtn" class="btn-gold w-full py-2">🔄 تحديث يدوي</button>
    </div>

    <!-- تبويب الباقات (مبسط) -->
    <div id="packagesContent" class="hidden space-y-4">
        <div class="card-bg p-5">
            <h3 class="gold-text font-bold mb-2">⭐ باقاتي</h3>
            <div id="currentPackageInfo" class="text-sm space-y-2"></div>
        </div>
        <div class="card-bg p-5">
            <h3 class="gold-text font-bold mb-2">🚀 عروض الترقية</h3>
            <div id="packagesList" class="space-y-3"></div>
        </div>
        <button id="upgradeContactBtn" class="btn-gold w-full py-2">📞 طلب ترقية</button>
    </div>

    <!-- تبويب الإعدادات (للمسؤول فقط) -->
    <div id="settingsContent" class="hidden space-y-4">
        <div class="card-bg p-5"><h3 class="gold-text font-bold mb-2">🎨 المظهر</h3><div class="flex gap-3"><button class="theme-btn flex-1 py-2 rounded-lg bg-gray-800" data-theme="dark">🌙 داكن</button><button class="theme-btn flex-1 py-2 rounded-lg bg-gray-800" data-theme="light">☀️ فاتح</button><button class="theme-btn flex-1 py-2 rounded-lg bg-gray-800" data-theme="gold">🔥 ذهبي</button></div></div>
        <div class="card-bg p-5"><h3 class="gold-text font-bold mb-2">📞 الدعم الفني</h3><button id="supportBtn" class="mt-2 text-gold underline">@nas5873</button></div>
        <div id="adminPanel" class="card-bg p-5 hidden"><h3 class="gold-text font-bold mb-2">🛠️ لوحة الإدارة</h3><div id="adminStats" class="text-sm"></div></div>
        <div class="text-center text-xs text-gray-500">Store Leads Pro V3.0</div>
    </div>
</div>

<div class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 py-2 flex justify-around max-w-md mx-auto">
    <button id="navRadar" class="tab-active flex flex-col items-center text-xs gold-text"><span>📡</span><span>الرادار</span></button>
    <button id="navPackages" class="flex flex-col items-center text-xs text-gray-400"><span>⭐</span><span>الباقات</span></button>
    <button id="navSettings" class="flex flex-col items-center text-xs text-gray-400"><span>⚙️</span><span>الإعدادات</span></button>
</div>

<script>
    // ================= التكوين =================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyQ3E3nOgVRU1ytokWqreBSKdkwndoAE9e4kaw3oK7owZnQ8nu5T1kDnTSRL3Pq2X4kvg/exec";
    const ADMIN_CHAT_ID = 6643939693; // ضع رقمك هنا
    let currentChatId = null;
    let currentStore = { name: "", package: "free", analysesLimit: 5, analysesUsed: 0, endDate: "" };
    let allLeads = [];

    // الحصول على معرف المستخدم
    try {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
            currentChatId = window.Telegram.WebApp.initDataUnsafe.user.id;
        } else {
            currentChatId = ADMIN_CHAT_ID; // وضع اختبار
        }
    } catch(e) { currentChatId = ADMIN_CHAT_ID; }

    // ========== تحميل المستخدم ==========
    async function loadUser() {
        if (!currentChatId) return;
        const res = await fetch(`${WEB_APP_URL}?action=getUser&chatId=${currentChatId}`);
        const data = await res.json();
        if (data.success && data.user) {
            currentStore.name = data.user.storeName || data.user.username || "تاجر";
            currentStore.package = data.user.package.toLowerCase();
            currentStore.analysesLimit = data.user.analysesLimit || 5;
            currentStore.analysesUsed = data.user.analysesUsed || 0;
            currentStore.endDate = data.user.endDate || "";
            document.getElementById('storeNameDisplay').innerText = currentStore.name;
            const badge = document.getElementById('userBadge');
            if (currentStore.package === 'gold') badge.innerHTML = '👑 ذهبية';
            else badge.innerHTML = '🆓 تجريبي';
            // تحديث معلومات الباقة في تبويب الباقات
            const remaining = currentStore.analysesLimit - currentStore.analysesUsed;
            document.getElementById('currentPackageInfo').innerHTML = `
                <p>📦 الباقة: <strong>${currentStore.package === 'gold' ? 'ذهبية 🔥' : 'تجريبية 🆓'}</strong></p>
                <p>📊 التحليلات: ${currentStore.analysesUsed} من ${currentStore.analysesLimit}</p>
                <div class="w-full bg-gray-700 rounded-full h-2"><div class="bg-gold h-2 rounded-full" style="width: ${(currentStore.analysesUsed/currentStore.analysesLimit)*100}%"></div></div>
                ${currentStore.endDate ? `<p>📅 التجديد: ${currentStore.endDate}</p>` : ''}
            `;
        }
    }

    // ========== جلب العملاء ==========
    async function loadLeads() {
        const leadsDiv = document.getElementById('leadsList');
        leadsDiv.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
        const res = await fetch(`${WEB_APP_URL}?action=getLeads`);
        const data = await res.json();
        if (data.success && data.leads.length) {
            allLeads = data.leads;
            renderLeads();
        } else {
            leadsDiv.innerHTML = '<div class="text-center text-gray-500">لا توجد تحليلات</div>';
        }
    }

    function renderLeads() {
        const leadsDiv = document.getElementById('leadsList');
        const todayStr = new Date().toISOString().slice(0,10);
        let todayCount = 0;
        let html = '';
        for (let lead of allLeads) {
            if (lead.date?.slice(0,10) === todayStr) todayCount++;
            const isGold = currentStore.package === 'gold';
            html += `
                <div class="card-bg p-3 border-r-4 border-gold">
                    <div class="flex justify-between"><span class="font-bold gold-text">${lead.username}</span></div>
                    <p class="text-sm text-gray-300 mt-1">${lead.tweet?.substring(0,80)}${lead.tweet?.length>80?'...':''}</p>
                    <div class="flex flex-wrap gap-2 mt-2">
                        <a href="${lead.url}" target="_blank" class="text-xs bg-gray-700 px-3 py-1 rounded-full">🔗 التغريدة</a>
                        ${isGold ? `<button class="analysis-btn text-xs bg-gold/20 px-3 py-1 rounded-full text-gold" data-full="${encodeURIComponent(lead.full_analysis || '')}">🧠 تحليل متقدم</button>` : `<button class="upgrade-trigger text-xs bg-gold/20 px-3 py-1 rounded-full text-gold">🔒 رقّي لترى التحليل المتقدم</button>`}
                    </div>
                    ${isGold ? `<div class="text-sm text-gray-400 mt-2">🎁 العرض: ${lead.offer || 'غير محدد'}</div>` : ''}
                </div>
            `;
        }
        document.getElementById('leadsCount').innerText = todayCount;
        leadsDiv.innerHTML = html;
        attachAnalysisButtons();
        attachUpgradeButtons();
    }

    function attachAnalysisButtons() {
        document.querySelectorAll('.analysis-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const fullText = decodeURIComponent(btn.getAttribute('data-full'));
                if (!fullText) {
                    alert("لا يوجد تحليل متقدم لهذه العميلة.");
                    return;
                }
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4';
                modal.innerHTML = `
                    <div class="bg-gray-900 rounded-2xl max-w-sm w-full max-h-[80vh] overflow-auto p-5 space-y-3">
                        <h3 class="gold-text font-bold text-lg">🧠 التحليل المتقدم</h3>
                        <div class="text-sm whitespace-pre-wrap">${fullText.replace(/\n/g, '<br>')}</div>
                        <button class="close-modal btn-gold w-full py-2 mt-2">إغلاق</button>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.querySelector('.close-modal').onclick = () => modal.remove();
            });
        });
    }

    function attachUpgradeButtons() {
        document.querySelectorAll('.upgrade-trigger').forEach(btn => {
            btn.addEventListener('click', () => {
                alert("🔒 هذه الميزة للمشتركين الذهبيين فقط. تواصل مع الدعم للترقية.");
                window.open('https://t.me/nas5873', '_blank');
            });
        });
    }

    // ========== جلب الباقات ==========
    async function loadPackages() {
        const res = await fetch(`${WEB_APP_URL}?action=getPackages`);
        const data = await res.json();
        if (data.success && data.packages.length) {
            let html = '';
            for (let pkg of data.packages) {
                html += `<div class="bg-black/40 rounded-xl p-3"><span class="gold-text">${pkg.name}</span> - ${pkg.price} ريال (${pkg.limit} تحليل)</div>`;
            }
            document.getElementById('packagesList').innerHTML = html;
        }
    }

    // ========== لوحة الإدارة المخفية ==========
    async function showAdminPanel() {
        if (currentChatId != ADMIN_CHAT_ID) return;
        const statsDiv = document.getElementById('adminStats');
        statsDiv.innerHTML = 'جاري التحميل...';
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getAdminData`);
            const data = await res.json();
            if (data.success) {
                statsDiv.innerHTML = `<p>👥 إجمالي المشتركين: ${data.totalSubscribers}</p><p>📊 تحليلات الشهر: ${data.monthlyLeads}</p><p>🟢 نشطاء اليوم: ${data.activeToday}</p>`;
            }
        } catch(e) { statsDiv.innerHTML = 'خطأ في التحميل'; }
        document.getElementById('adminPanel').classList.remove('hidden');
    }

    // ========== تبديل التبويبات ==========
    function switchTab(tab) {
        document.getElementById('radarContent').classList.add('hidden');
        document.getElementById('packagesContent').classList.add('hidden');
        document.getElementById('settingsContent').classList.add('hidden');
        if (tab === 'radar') document.getElementById('radarContent').classList.remove('hidden');
        if (tab === 'packages') { document.getElementById('packagesContent').classList.remove('hidden'); loadPackages(); }
        if (tab === 'settings') { document.getElementById('settingsContent').classList.remove('hidden'); if (currentChatId == ADMIN_CHAT_ID) showAdminPanel(); }
        ['navRadar','navPackages','navSettings'].forEach(id => {
            const btn = document.getElementById(id);
            btn.classList.remove('gold-text','tab-active');
            btn.classList.add('text-gray-400');
        });
        document.getElementById(`nav${tab.charAt(0).toUpperCase()+tab.slice(1)}`).classList.add('gold-text','tab-active');
    }

    // ========== الأحداث ==========
    document.getElementById('navRadar').onclick = () => switchTab('radar');
    document.getElementById('navPackages').onclick = () => switchTab('packages');
    document.getElementById('navSettings').onclick = () => switchTab('settings');
    document.getElementById('refreshBtn').onclick = () => loadLeads();
    document.getElementById('supportBtn').onclick = () => window.open('https://t.me/nas5873','_blank');
    document.getElementById('upgradeContactBtn').onclick = () => window.open('https://t.me/nas5873','_blank');

    // الثيمات
    function applyTheme(theme) {
        if (theme === 'light') document.body.style.backgroundColor = '#f3f4f6';
        else if (theme === 'gold') document.body.style.backgroundColor = '#1f1a0a';
        else document.body.style.backgroundColor = '#0a0a0a';
        localStorage.setItem('theme_pref', theme);
    }
    document.querySelectorAll('.theme-btn').forEach(btn => btn.onclick = () => applyTheme(btn.getAttribute('data-theme')));
    applyTheme(localStorage.getItem('theme_pref') || 'dark');

    // بدء التشغيل
    loadUser();
    loadLeads();
    if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
</script>
</body>
            </html>
