<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Store Leads Pro | Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; font-family: system-ui, 'Segoe UI'; }
        .card-bg { background: #1e1e1e; border-radius: 1.5rem; }
        .gold-text { color: #f59e0b; }
        .btn-gold { background: #f59e0b; color: black; font-weight: bold; border-radius: 2rem; padding: 0.5rem 1rem; transition: 0.2s; }
        .btn-gold:hover { transform: scale(0.98); }
        .tab-active { color: #f59e0b; border-bottom: 2px solid #f59e0b; }
        .vip-badge { background: linear-gradient(135deg, #f59e0b, #b45309); color: white; border-radius: 2rem; padding: 0.2rem 0.6rem; font-size: 0.7rem; font-weight: bold; }
        .avatar { width: 36px; height: 36px; background: #333; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .skeleton { background: #2a2a2a; border-radius: 1rem; height: 80px; margin-bottom: 1rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body class="text-white">

<!-- شريط علوي ثابت -->
<div class="fixed top-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-b border-gray-800 z-10">
    <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2"><div class="text-2xl 👑">👑</div><div><h1 class="text-xl font-black gold-text">STORE LEADS PRO</h1><p class="text-xs text-gray-400">Intelligence Hub</p></div></div>
        <div id="userBadge" class="bg-gray-800 px-3 py-1 rounded-full text-sm gold-text">🔄</div>
    </div>
</div>

<!-- المحتوى الرئيسي -->
<div class="max-w-md mx-auto px-4 pt-20 pb-24">
    <!-- تبويب الرادار -->
    <div id="radarContent" class="space-y-4">
        <div class="card-bg p-5 text-center">
            <p class="text-gray-300">مرحبًا <span id="storeNameDisplay" class="gold-text font-bold">...</span></p>
            <div id="pulseCount" class="text-3xl font-black gold-text">0</div>
            <p class="text-xs">عميلات اليوم</p>
            <div id="fomoText" class="text-xs gold-text mt-2 animate-pulse hidden"></div>
        </div>
        <!-- شريط الفلتر -->
        <div class="flex gap-2 justify-center">
            <button id="filterAll" class="btn-gold text-sm py-1 px-3 bg-opacity-20">كل العملاء</button>
            <button id="filterUncontacted" class="btn-gold text-sm py-1 px-3 bg-opacity-20">لم يتم التواصل</button>
        </div>
        <div id="leadsList" class="space-y-3"></div>
        <button id="refreshBtn" class="btn-gold w-full py-2">🔄 تحديث يدوي</button>
    </div>

    <!-- تبويب الباقات (للمقارنة) -->
    <div id="packagesContent" class="hidden space-y-4">
        <div class="card-bg p-5"><h3 class="gold-text font-bold mb-2">🚀 عروض الترقية</h3><div id="packagesList" class="space-y-3"></div></div>
        <button id="upgradeContactBtn" class="btn-gold w-full py-2">📞 طلب ترقية أو دعم</button>
    </div>

    <!-- تبويب حسابي (جديد) -->
    <div id="accountContent" class="hidden space-y-4">
        <div class="card-bg p-5">
            <h3 class="gold-text font-bold mb-3">👤 حسابي</h3>
            <div class="space-y-3 text-sm">
                <div><span class="text-gray-400">اسم المتجر:</span> <span id="storeNameAccount" class="gold-text font-bold"></span> <button id="editStoreNameBtn" class="text-xs bg-gray-700 px-2 py-1 rounded-lg">✏️ تعديل</button></div>
                <div><span class="text-gray-400">الباقة:</span> <span id="accountPackageBadge"></span></div>
                <div><span class="text-gray-400">التحليلات:</span> <span id="accountUsage"></span></div>
                <div><span class="text-gray-400">تاريخ التجديد:</span> <span id="accountRenewal"></span></div>
                <hr class="border-gray-700">
                <div><span class="text-gray-400">تخصص المتجر:</span> <span id="storeSpecialty"></span> <button id="editSpecialtyBtn" class="text-xs bg-gray-700 px-2 py-1 rounded-lg">✏️</button></div>
                <div><span class="text-gray-400">المنصات المستخدمة:</span> <span id="storePlatforms"></span> <button id="editPlatformsBtn" class="text-xs bg-gray-700 px-2 py-1 rounded-lg">✏️</button></div>
            </div>
        </div>
    </div>

    <!-- تبويب الإعدادات (الثيمات والدعم + لوحة إدارة للمسؤول) -->
    <div id="settingsContent" class="hidden space-y-4">
        <div class="card-bg p-5"><h3 class="gold-text font-bold mb-3">🎨 المظهر</h3><div class="flex gap-3"><button class="theme-btn flex-1 py-2 rounded-lg bg-gray-800" data-theme="dark">🌙 داكن</button><button class="theme-btn flex-1 py-2 rounded-lg bg-gray-800" data-theme="light">☀️ فاتح</button><button class="theme-btn flex-1 py-2 rounded-lg bg-gray-800" data-theme="gold">🔥 ذهبي</button></div></div>
        <div class="card-bg p-5"><h3 class="gold-text font-bold mb-2">📞 الدعم الفني</h3><button id="supportBtn" class="mt-2 text-gold underline">@nas5873 (اضغط للتواصل)</button></div>
        <div id="adminPanel" class="card-bg p-5 hidden"><h3 class="gold-text font-bold mb-2">🛠️ لوحة الإدارة</h3><div id="adminTools" class="space-y-2 text-sm"></div></div>
        <div class="text-center text-xs text-gray-500">تم التطوير بواسطة Store Leads Pro V3.0</div>
    </div>
</div>

<!-- الشريط السفلي (4 تبويبات) -->
<div class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 py-2 flex justify-around max-w-md mx-auto">
    <button id="navRadar" class="tab-active flex flex-col items-center text-xs gold-text"><span>📡</span><span>الرادار</span></button>
    <button id="navPackages" class="flex flex-col items-center text-xs text-gray-400"><span>⭐</span><span>الباقات</span></button>
    <button id="navAccount" class="flex flex-col items-center text-xs text-gray-400"><span>👤</span><span>حسابي</span></button>
    <button id="navSettings" class="flex flex-col items-center text-xs text-gray-400"><span>⚙️</span><span>الإعدادات</span></button>
</div>

<script>
    // ================= التكوين الأساسي =================
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNaB4D8t44J-LZrBw_joqLOBMUpnc8pzBfjrdV08lA4eIZT9f9pV_E48d_ALvY36vV/exec";
    let currentChatId = null;
    let currentStore = { name: "", package: "free", analysesLimit: 5, analysesUsed: 0, endDate: "", specialty: "", platforms: "" };
    let allLeads = [];
    let filterMode = "all"; // all أو uncontacted

    // الحصول على معرف المستخدم من تليجرام
    try {
        if (window.Telegram?.WebApp?.initDataUnsafe?.user) {
            currentChatId = window.Telegram.WebApp.initDataUnsafe.user.id;
        } else {
            // وضع اختبار (ضع معرفك الصحيح هنا)
            currentChatId = 6643939693;
        }
    } catch(e) { currentChatId = 6643939693; }

    // ================= إعدادات FOMO والإدارة =================
    async function loadSettings() {
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getSettings`);
            const data = await res.json();
            if (data.success) {
                if (data.fomo_text) document.getElementById('fomoText').innerText = data.fomo_text;
                if (data.show_fomo === 'TRUE') document.getElementById('fomoText').classList.remove('hidden');
                else document.getElementById('fomoText').classList.add('hidden');
                // معرف المسؤول مخزن في الـ Settings
                if (data.admin_chat_id && currentChatId == data.admin_chat_id) document.getElementById('adminPanel').classList.remove('hidden');
            }
        } catch(e) {}
    }

    // ================= بيانات المستخدم مع تخزين specialty و platforms =================
    async function loadUserData() {
        if (!currentChatId) return;
        const res = await fetch(`${WEB_APP_URL}?action=getUser&chatId=${currentChatId}`);
        const data = await res.json();
        if (data.success && data.user) {
            let pkg = (data.user.package || 'free').toLowerCase();
            currentStore.name = data.user.storeName || data.user.username || "تاجر";
            currentStore.package = pkg;
            currentStore.analysesLimit = data.user.analysesLimit || 5;
            currentStore.analysesUsed = data.user.analysesUsed || 0;
            currentStore.endDate = data.user.endDate || "";
            currentStore.specialty = data.user.specialty || "";
            currentStore.platforms = data.user.platforms || "";
            document.getElementById('storeNameDisplay').innerText = currentStore.name;
            document.getElementById('storeNameAccount').innerText = currentStore.name;
            const badge = document.getElementById('userBadge');
            if (pkg === 'gold') badge.innerHTML = '👑 ذهبية <span class="vip-badge">VIP</span>';
            else if (pkg === 'silver') badge.innerHTML = '🥈 فضية';
            else badge.innerHTML = '🆓 تجريبي';
            let badgeHtml = '';
            if (pkg === 'gold') badgeHtml = '<span class="vip-badge">👑 ذهبية VIP</span>';
            else if (pkg === 'silver') badgeHtml = '<span class="vip-badge">🥈 فضية</span>';
            else badgeHtml = '<span class="vip-badge">🆓 تجريبي</span>';
            document.getElementById('accountPackageBadge').innerHTML = badgeHtml;
            document.getElementById('accountUsage').innerHTML = `${currentStore.analysesUsed} من ${currentStore.analysesLimit}`;
            document.getElementById('accountRenewal').innerHTML = currentStore.endDate || "غير محدد";
            document.getElementById('storeSpecialty').innerHTML = currentStore.specialty || "غير محدد";
            document.getElementById('storePlatforms').innerHTML = currentStore.platforms || "غير محدد";
        }
    }

    // تعديل اسم المتجر (حفظ في Sheets)
    async function updateStoreName(newName) {
        await fetch(WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'updateStoreName', chatId: currentChatId, storeName: newName }) });
        currentStore.name = newName;
        document.getElementById('storeNameDisplay').innerText = newName;
        document.getElementById('storeNameAccount').innerText = newName;
    }

    async function updateSpecialty(newVal) { /* مشابه */ }
    async function updatePlatforms(newVal) { /* مشابه */ }

    // ================= جلب العملاء مع الصور الرمزية والفلتر =================
    async function loadLeads() {
        const leadsDiv = document.getElementById('leadsList');
        leadsDiv.innerHTML = '<div class="skeleton"></div><div class="skeleton"></div>';
        const res = await fetch(`${WEB_APP_URL}?action=getLeads`);
        const data = await res.json();
        if (data.success && data.leads.length) {
            allLeads = data.leads;
            renderLeads();
        } else {
            leadsDiv.innerHTML = '<div class="text-center text-gray-500 py-8">لا توجد تحليلات حديثة</div>';
        }
    }

    function renderLeads() {
        let leadsToShow = filterMode === 'all' ? allLeads : allLeads.filter(lead => lead.contacted !== true && lead.contacted !== 'TRUE');
        const todayStr = new Date().toISOString().slice(0,10);
        let todayCount = 0;
        let html = '';
        for (let lead of leadsToShow) {
            if (lead.date?.slice(0,10) === todayStr) todayCount++;
            const heat = lead.heat || 5;
            const fire = '🔥'.repeat(Math.min(heat, 5));
            const contacted = (lead.contacted === true || lead.contacted === 'TRUE');
            const avatarLetter = (lead.username && lead.username.length > 1) ? lead.username[1] : '?';
            html += `
                <div class="card-bg p-3 border-r-4 border-gold flex gap-3 items-start">
                    <div class="avatar">${avatarLetter}</div>
                    <div class="flex-1">
                        <div class="flex justify-between"><span class="font-bold gold-text">${lead.username}</span><span>${fire} ${heat}/10</span></div>
                        <p class="text-sm text-gray-300 mt-1">${lead.tweet?.substring(0,80)}${lead.tweet?.length>80?'...':''}</p>
                        <div class="flex flex-wrap gap-2 mt-2">
                            <button class="reply-btn text-xs bg-gold/20 px-3 py-1 rounded-full text-gold" data-reply="${(lead.reply || '').replace(/"/g, '&quot;')}">📋 عرض الرد والنسخ</button>
                            <a href="${lead.url}" target="_blank" class="text-xs bg-gray-700 px-3 py-1 rounded-full">🔗 التغريدة</a>
                            ${!contacted ? `<button class="contact-btn text-xs bg-green-800 px-3 py-1 rounded-full text-white" data-lead-url="${encodeURIComponent(lead.url)}">✅ تم التواصل</button>` : '<span class="text-xs text-green-500 px-3 py-1">✅ تم التواصل</span>'}
                        </div>
                    </div>
                </div>
            `;
        }
        document.getElementById('pulseCount').innerText = todayCount;
        document.getElementById('leadsList').innerHTML = html;
        attachReplyButtons();
        attachContactButtons();
    }

    function attachReplyButtons() { /* كما هو سابق */ }
    async function attachContactButtons() { /* كما هو مع تحديث contacted */ }

    // فلتر
    document.getElementById('filterAll').onclick = () => { filterMode = 'all'; renderLeads(); };
    document.getElementById('filterUncontacted').onclick = () => { filterMode = 'uncontacted'; renderLeads(); };

    // ================= إدارة الباقات (للمسؤول) =================
    async function loadPackages() { /* عرض الباقات مع إمكانية تعديل لكل باقة */ }
    async function updatePackage(pkgId, newPrice, newName, newFeatures) { /* تنفيذ على Sheets */ }

    // ================= عرض النشاط (المستخدمين النشطين) =================
    async function loadActiveUsers() {
        if (!document.getElementById('adminPanel').classList.contains('hidden')) return;
        const res = await fetch(`${WEB_APP_URL}?action=getActiveUsers`);
        const data = await res.json();
        if (data.success && data.users) {
            let html = '<div><h4>👥 نشطاء الآن (آخر 10 دقائق):</h4><ul>';
            data.users.forEach(u => html += `<li>${u.username || u.chatId} - آخر نشاط ${u.last_active}</li>`);
            html += '</ul></div>';
            document.getElementById('adminTools').innerHTML = html;
        }
    }

    // ================= تبديل التبويبات مع تحميل البيانات ديناميكياً =================
    const radarDiv = document.getElementById('radarContent');
    const packagesDiv = document.getElementById('packagesContent');
    const accountDiv = document.getElementById('accountContent');
    const settingsDiv = document.getElementById('settingsContent');
    const navRadar = document.getElementById('navRadar');
    const navPackages = document.getElementById('navPackages');
    const navAccount = document.getElementById('navAccount');
    const navSettings = document.getElementById('navSettings');

    function switchTab(tab) {
        [radarDiv, packagesDiv, accountDiv, settingsDiv].forEach(d => d.classList.add('hidden'));
        if (tab === 'radar') radarDiv.classList.remove('hidden');
        if (tab === 'packages') packagesDiv.classList.remove('hidden');
        if (tab === 'account') accountDiv.classList.remove('hidden');
        if (tab === 'settings') settingsDiv.classList.remove('hidden');
        [navRadar, navPackages, navAccount, navSettings].forEach(btn => { btn.classList.remove('gold-text', 'tab-active'); btn.classList.add('text-gray-400'); });
        if (tab === 'radar') navRadar.classList.add('gold-text', 'tab-active');
        if (tab === 'packages') navPackages.classList.add('gold-text', 'tab-active');
        if (tab === 'account') navAccount.classList.add('gold-text', 'tab-active');
        if (tab === 'settings') navSettings.classList.add('gold-text', 'tab-active');
        if (tab === 'packages') loadPackages();
        if (tab === 'settings') loadActiveUsers();
    }

    navRadar.onclick = () => switchTab('radar');
    navPackages.onclick = () => switchTab('packages');
    navAccount.onclick = () => switchTab('account');
    navSettings.onclick = () => switchTab('settings');
    document.getElementById('refreshBtn').onclick = () => { loadLeads(); };
    document.getElementById('supportBtn').onclick = () => window.open('https://t.me/nas5873', '_blank');
    document.getElementById('upgradeContactBtn').onclick = () => window.open('https://t.me/nas5873', '_blank');
    document.getElementById('editStoreNameBtn').onclick = () => { let newName = prompt("اسم المتجر الجديد:", currentStore.name); if(newName) updateStoreName(newName); };
    // دوال تعديل التخصص والمنصات مشابهة

    // الثيمات
    function applyTheme(theme) {
        if (theme === 'light') document.body.style.backgroundColor = '#f3f4f6';
        else if (theme === 'gold') document.body.style.backgroundColor = '#1f1a0a';
        else document.body.style.backgroundColor = '#0a0a0a';
        localStorage.setItem('theme_pref', theme);
    }
    document.querySelectorAll('.theme-btn').forEach(btn => btn.addEventListener('click', () => applyTheme(btn.getAttribute('data-theme'))));
    applyTheme(localStorage.getItem('theme_pref') || 'dark');

    window.onload = () => { loadSettings(); loadUserData(); loadLeads(); };
    if (window.Telegram?.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
</script>
</body>
    </html>
