<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Store Leads Pro | Intelligence Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom config for RTL and colors -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'cairo': ['Cairo', 'sans-serif'],
                    },
                    colors: {
                        'gold': '#f59e0b',
                        'dark-bg': '#1a1a1a',
                        'card-bg': '#262626',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
        }
        /* Custom skeleton loading animation */
        .skeleton {
            background: linear-gradient(90deg, #2a2a2a 25%, #3a3a3a 50%, #2a2a2a 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #f59e0b;
            border-radius: 10px;
        }
        /* Tab active style */
        .tab-active {
            color: #f59e0b;
            border-bottom: 2px solid #f59e0b;
        }
        .glow-gold {
            box-shadow: 0 0 8px rgba(245, 158, 11, 0.3);
        }
    </style>
</head>
<body class="bg-dark-bg text-white">

    <!-- Main Container -->
    <div class="max-w-md mx-auto pb-20">
        
        <!-- Header with store info -->
        <div class="bg-gradient-to-r from-black to-gray-900 p-4 rounded-b-2xl shadow-lg">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-xl font-bold text-gold">Store Leads Pro</h1>
                    <p class="text-xs text-gray-400">Intelligence Hub v3.0</p>
                </div>
                <div id="userBadge" class="bg-gold/20 px-3 py-1 rounded-full flex items-center gap-1">
                    <span class="text-gold text-sm font-bold" id="userPackage">... 🔄</span>
                </div>
            </div>
            <!-- Store name editable later -->
            <div id="storeInfo" class="mt-2 text-sm text-gray-300">
                مرحبًا <span id="storeName" class="font-semibold text-white">...</span>
            </div>
        </div>

        <!-- Bottom Navigation Tabs -->
        <div class="fixed bottom-0 left-0 right-0 bg-black border-t border-gray-800 flex justify-around py-2 z-10 max-w-md mx-auto">
            <button id="tabRadar" class="tab-active flex flex-col items-center py-1 px-4 text-gold transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span class="text-xs">الرادار</span>
            </button>
            <button id="tabPackages" class="flex flex-col items-center py-1 px-4 text-gray-400 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-xs">الباقات</span>
            </button>
            <button id="tabSettings" class="flex flex-col items-center py-1 px-4 text-gray-400 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="text-xs">الإعدادات</span>
            </button>
        </div>

        <!-- Tab Content: Radar -->
        <div id="radarContent" class="p-4 space-y-4">
            <!-- Market pulse card -->
            <div class="bg-card-bg rounded-2xl p-4 glow-gold">
                <div class="flex justify-between items-center">
                    <span class="text-gold font-bold">📡 نبض السوق</span>
                    <span id="leadsCount" class="text-2xl font-bold text-white">0</span>
                </div>
                <p class="text-xs text-gray-400">عميلات تم رصدهن اليوم</p>
            </div>
            <!-- Leads list skeleton -->
            <div id="leadsList" class="space-y-3">
                <div class="skeleton h-24 rounded-xl"></div>
                <div class="skeleton h-24 rounded-xl"></div>
                <div class="skeleton h-24 rounded-xl"></div>
            </div>
            <button id="refreshLeads" class="w-full bg-gold/20 border border-gold text-gold py-2 rounded-xl font-bold text-sm">🔄 تحديث يدوي</button>
        </div>

        <!-- Tab Content: Packages (hidden initially) -->
        <div id="packagesContent" class="p-4 space-y-4 hidden">
            <div class="bg-card-bg rounded-2xl p-4">
                <h3 class="font-bold text-gold mb-2">⭐ باقاتي واشتراكي</h3>
                <div id="currentPackageInfo" class="space-y-2 text-sm">
                    <p>🔄 جاري تحميل بيانات اشتراكك...</p>
                </div>
                <div class="mt-4 pt-3 border-t border-gray-700">
                    <h4 class="font-semibold mb-2">🚀 عروض الترقية</h4>
                    <div id="packagesList" class="space-y-3"></div>
                </div>
            </div>
            <button id="contactSupport" class="w-full bg-gold text-black font-bold py-3 rounded-xl">📞 طلب ترقية أو دعم</button>
        </div>

        <!-- Tab Content: Settings (hidden initially) -->
        <div id="settingsContent" class="p-4 space-y-4 hidden">
            <div class="bg-card-bg rounded-2xl p-4">
                <h3 class="font-bold text-gold mb-3">🎨 المظهر</h3>
                <div class="flex justify-around">
                    <button class="theme-btn w-1/3 py-2 mx-1 rounded-lg bg-black text-white border border-gray-600" data-theme="dark">🌙 داكن</button>
                    <button class="theme-btn w-1/3 py-2 mx-1 rounded-lg bg-white text-black border border-gray-300" data-theme="light">☀️ فاتح</button>
                    <button class="theme-btn w-1/3 py-2 mx-1 rounded-lg bg-gold text-black font-bold" data-theme="gold">🔥 ذهبي</button>
                </div>
            </div>
            <div class="bg-card-bg rounded-2xl p-4">
                <h3 class="font-bold text-gold mb-2">📞 الدعم الفني</h3>
                <p class="text-sm text-gray-300">للاستفسارات أو مشاكل الاشتراك</p>
                <button id="supportBtn" class="mt-2 text-gold underline">@nas5873 (اضغط للتواصل)</button>
            </div>
            <div class="bg-card-bg rounded-2xl p-4 text-center text-xs text-gray-500">
                تم التطوير بواسطة Store Leads Pro V3.0
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // Store Leads Pro TMA - Main Script
        // ============================================================
        
        // Configuration
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyNaB4D8t44J-LZrBw_joqLOBMUpnc8pzBfjrdV08lA4eIZT9f9pV_E48d_ALvY36vV/exec";
        let tg = window.Telegram.WebApp;
        let initDataUnsafe = tg.initDataUnsafe || {};
        let currentChatId = (initDataUnsafe.user && initDataUnsafe.user.id) ? initDataUnsafe.user.id : null;
        let currentUsername = (initDataUnsafe.user && initDataUnsafe.user.username) ? initDataUnsafe.user.username : "تاجر";
        let storeData = { storeName: "", package: "free", analysesUsed: 0, analysesLimit: 5, endDate: "" };
        
        // UI Elements
        const radarContent = document.getElementById('radarContent');
        const packagesContent = document.getElementById('packagesContent');
        const settingsContent = document.getElementById('settingsContent');
        const tabRadar = document.getElementById('tabRadar');
        const tabPackages = document.getElementById('tabPackages');
        const tabSettings = document.getElementById('tabSettings');
        
        // Theme handling
        function applyTheme(theme) {
            if (theme === 'light') {
                document.body.classList.remove('bg-dark-bg');
                document.body.style.backgroundColor = '#f3f4f6';
                document.querySelectorAll('.bg-card-bg').forEach(el => el.classList.remove('bg-card-bg'));
                document.querySelectorAll('.bg-card-bg').forEach(el => el.style.backgroundColor = '#ffffff');
                document.querySelectorAll('.text-white').forEach(el => el.classList.remove('text-white'));
                document.querySelectorAll('.text-white').forEach(el => el.classList.add('text-gray-900'));
                document.querySelectorAll('.text-gray-300').forEach(el => el.classList.remove('text-gray-300'));
                document.querySelectorAll('.text-gray-300').forEach(el => el.classList.add('text-gray-600'));
            } else if (theme === 'gold') {
                document.body.classList.remove('bg-dark-bg');
                document.body.style.backgroundColor = '#1f1a0a';
                document.querySelectorAll('.bg-card-bg').forEach(el => el.classList.add('bg-card-bg'));
                document.querySelectorAll('.bg-card-bg').forEach(el => el.style.backgroundColor = '#2a2415');
                document.querySelectorAll('.text-white').forEach(el => el.classList.add('text-white'));
                document.querySelectorAll('.text-gray-300').forEach(el => el.classList.add('text-gray-300'));
            } else { // dark default
                document.body.classList.add('bg-dark-bg');
                document.body.style.backgroundColor = '';
                document.querySelectorAll('.bg-card-bg').forEach(el => el.classList.add('bg-card-bg'));
                document.querySelectorAll('.text-white').forEach(el => el.classList.add('text-white'));
            }
            localStorage.setItem('theme_pref', theme);
        }
        
        // Load user data from server
        async function loadUserData() {
            if (!currentChatId) {
                document.getElementById('storeName').innerText = "غير معرّف";
                return;
            }
            const url = `${WEB_APP_URL}?action=getUser&chatId=${currentChatId}`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.success && data.user) {
                    const u = data.user;
                    storeData.storeName = u.storeName || currentUsername;
                    storeData.package = u.package;
                    storeData.analysesUsed = u.analysesUsed || 0;
                    storeData.analysesLimit = u.analysesLimit || 5;
                    storeData.endDate = u.endDate || "";
                    document.getElementById('storeName').innerText = storeData.storeName;
                    const badge = document.getElementById('userPackage');
                    if (u.package === 'gold') badge.innerHTML = '👑 ذهبية';
                    else if (u.package === 'silver') badge.innerHTML = '🥈 فضية';
                    else badge.innerHTML = '🆓 تجريبية';
                    
                    // Update current package info in packages tab
                    let remaining = storeData.analysesLimit - storeData.analysesUsed;
                    if (remaining < 0) remaining = 0;
                    document.getElementById('currentPackageInfo').innerHTML = `
                        <p>📦 الباقة: <strong class="text-gold">${storeData.package === 'gold' ? 'ذهبية 🔥' : (storeData.package === 'silver' ? 'فضية 🥈' : 'تجريبية 🆓')}</strong></p>
                        <p>📊 التحليلات: ${storeData.analysesUsed} من ${storeData.analysesLimit}</p>
                        <div class="w-full bg-gray-700 rounded-full h-2"><div class="bg-gold h-2 rounded-full" style="width: ${(storeData.analysesUsed/storeData.analysesLimit)*100}%"></div></div>
                        ${storeData.endDate ? `<p>📅 التجديد: ${storeData.endDate}</p>` : ''}
                    `;
                } else {
                    document.getElementById('storeName').innerText = "زائر";
                }
            } catch(e) {
                console.error(e);
                document.getElementById('storeName').innerText = "خطأ في الاتصال";
            }
        }
        
        // Load leads (latest 5)
        async function loadLeads() {
            const leadsContainer = document.getElementById('leadsList');
            leadsContainer.innerHTML = '<div class="skeleton h-24 rounded-xl"></div><div class="skeleton h-24 rounded-xl"></div>';
            const url = `${WEB_APP_URL}?action=getLeads`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.success && data.leads.length) {
                    let html = '';
                    data.leads.forEach(lead => {
                        html += `
                            <div class="bg-card-bg rounded-xl p-3 border-r-4 border-gold">
                                <div class="flex justify-between"><span class="font-bold text-gold">${lead.username}</span><span class="text-sm">🔥 ${lead.intent || '?'}</span></div>
                                <p class="text-sm text-gray-300 mt-1">${lead.tweet.substring(0, 80)}${lead.tweet.length>80?'...':''}</p>
                                <div class="flex gap-2 mt-2">
                                    <button class="reply-btn text-xs bg-gold/20 px-3 py-1 rounded-full text-gold" data-reply="${lead.reply.replace(/"/g, '&quot;')}">📋 عرض الرد</button>
                                    <a href="${lead.url}" target="_blank" class="text-xs bg-gray-700 px-3 py-1 rounded-full">🔗 التغريدة</a>
                                </div>
                            </div>
                        `;
                    });
                    leadsContainer.innerHTML = html;
                    document.getElementById('leadsCount').innerText = data.leads.length;
                    // attach reply button events
                    document.querySelectorAll('.reply-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            alert(btn.getAttribute('data-reply'));
                        });
                    });
                } else {
                    leadsContainer.innerHTML = '<div class="text-center text-gray-500 py-8">لا توجد تحليلات حديثة</div>';
                    document.getElementById('leadsCount').innerText = '0';
                }
            } catch(e) {
                leadsContainer.innerHTML = '<div class="text-center text-red-500">فشل التحميل</div>';
            }
        }
        
        // Load packages for upgrade
        async function loadPackages() {
            const url = `${WEB_APP_URL}?action=getPackages`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if (data.success && data.packages.length) {
                    let html = '';
                    data.packages.forEach(pkg => {
                        if (!pkg.active) return;
                        let isCurrent = (pkg.id === storeData.package);
                        html += `
                            <div class="bg-black/50 rounded-xl p-3 ${isCurrent ? 'border border-gold' : ''}">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-gold">${pkg.badge} ${pkg.name}</span>
                                    <span class="text-white">${pkg.price} ريال</span>
                                </div>
                                <p class="text-xs text-gray-400 mt-1">${pkg.features || `${pkg.limit} تحليل`}</p>
                                ${!isCurrent ? `<button class="upgrade-btn mt-2 w-full bg-gold text-black text-sm py-1 rounded-lg" data-package="${pkg.id}">🚀 ترقية</button>` : '<span class="text-xs text-green-500 mt-2 inline-block">✓ باقاتك الحالية</span>'}
                            </div>
                        `;
                    });
                    document.getElementById('packagesList').innerHTML = html;
                    document.querySelectorAll('.upgrade-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            tg.openTelegramLink('https://t.me/nas5873'); // change to your support username
                        });
                    });
                } else {
                    document.getElementById('packagesList').innerHTML = '<p class="text-center">عروض قريباً</p>';
                }
            } catch(e) {}
        }
        
        // Update last active timestamp (when user opens app)
        async function updateLastActive() {
            if (!currentChatId) return;
            await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'updateLastActive', chatId: currentChatId})
            });
        }
        
        // Tab switching
        function switchTab(tab) {
            radarContent.classList.add('hidden');
            packagesContent.classList.add('hidden');
            settingsContent.classList.add('hidden');
            if (tab === 'radar') radarContent.classList.remove('hidden');
            if (tab === 'packages') packagesContent.classList.remove('hidden');
            if (tab === 'settings') settingsContent.classList.remove('hidden');
            // update tab styles
            [tabRadar, tabPackages, tabSettings].forEach(btn => {
                btn.classList.remove('tab-active', 'text-gold');
                btn.classList.add('text-gray-400');
            });
            if (tab === 'radar') tabRadar.classList.add('tab-active', 'text-gold');
            if (tab === 'packages') tabPackages.classList.add('tab-active', 'text-gold');
            if (tab === 'settings') tabSettings.classList.add('tab-active', 'text-gold');
            if (tab === 'packages') loadPackages();
        }
        
        // Event listeners
        tabRadar.addEventListener('click', () => switchTab('radar'));
        tabPackages.addEventListener('click', () => switchTab('packages'));
        tabSettings.addEventListener('click', () => switchTab('settings'));
        document.getElementById('refreshLeads').addEventListener('click', () => loadLeads());
        document.getElementById('supportBtn')?.addEventListener('click', () => tg.openTelegramLink('https://t.me/nas5873'));
        document.getElementById('contactSupport')?.addEventListener('click', () => tg.openTelegramLink('https://t.me/nas5873'));
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => applyTheme(btn.getAttribute('data-theme')));
        });
        
        // Initialization
        tg.ready();
        tg.expand();
        
        // Settings theme from localStorage
        const savedTheme = localStorage.getItem('theme_pref') || 'dark';
        applyTheme(savedTheme);
        
        // load data
        loadUserData().then(() => {
            loadLeads();
            if (storeData.package !== 'free') loadPackages();
        });
        updateLastActive();
    </script>
</body>
</html>
